services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-craftdb}
      POSTGRES_USER: ${POSTGRES_USER:-craft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-craftpass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-craft}:${POSTGRES_PASSWORD:-craftpass}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-craftdb}
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
